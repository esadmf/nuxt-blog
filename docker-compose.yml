services:
  blog:
    build: .
    ports:
      - "${HOST_PORT:-3000}:3000"
    volumes:
      # Mount your content directory so posts can be added without rebuilding.
      # Set CONTENT_HOST_DIR in .env to override (e.g. /mnt/data/blog)
      - ${CONTENT_HOST_DIR:-./content}:/app/content
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - CONTENT_DIR=/app/content
      - TZ=America/Denver
    restart: unless-stopped
